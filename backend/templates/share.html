<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.EpisodeTitle}} — {{.PodcastTitle}} | Briefcast</title>
    <meta name="description" content="{{.Teaser}}">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{.EpisodeTitle}}">
    <meta property="og:description" content="{{.Teaser}}">
    {{if .PodcastImageURL}}<meta property="og:image" content="{{.PodcastImageURL}}">{{end}}
    <meta property="og:site_name" content="Briefcast">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{.EpisodeTitle}}">
    <meta name="twitter:description" content="{{.Teaser}}">
    <style>
        /* Clean, readable typography - similar to Medium/Pocket reading experience */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.7;
            color: #1a1a1a;
            background: #fafafa;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e5e5;
        }
        .podcast-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
        .podcast-info img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }
        .meta {
            color: #888;
            font-size: 0.85rem;
        }
        .meta a {
            color: #0066cc;
            text-decoration: none;
        }
        .meta a:hover { text-decoration: underline; }
        article { font-size: 1.05rem; }
        article h2 {
            font-size: 1.4rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        article h3 {
            font-size: 1.15rem;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        article p { margin-bottom: 1rem; }
        article ul, article ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        article li { margin-bottom: 0.3rem; }
        article blockquote {
            border-left: 3px solid #ddd;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #555;
            font-style: italic;
        }
        article code {
            background: #f0f0f0;
            padding: 0.15rem 0.35rem;
            border-radius: 3px;
            font-size: 0.9em;
        }
        article a { color: #0066cc; }
        .footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e5e5;
            color: #888;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="podcast-info">
                {{if .PodcastImageURL}}<img src="{{.PodcastImageURL}}" alt="">{{end}}
                <span>{{.PodcastTitle}}</span>
            </div>
            <h1>{{.EpisodeTitle}}</h1>
            <p class="meta">
                {{.PublishedAt}}
                {{if .AudioURL}} · <a href="{{.AudioURL}}" target="_blank">Listen to episode</a>{{end}}
            </p>
        </div>
        <article>
            {{.SummaryHTML}}
        </article>
        <div class="footer">
            Summary generated by Briefcast
        </div>
    </div>
</body>
</html>
